# ==============================================================================
# gpud 弹性 GPU 调度配置文件 (Declarative GPU Configuration)
# ==============================================================================
# active_gpus: 定义当前 Epoch 参与 PyTorch 分布式数据并行（DDP）训练的物理 GPU 卡号列表
#
# 【动态增减容与卡号指定规则】：
# 1. 训练运行过程中，你可以随时手动修改此数组并直接保存文件。
# 2. gpud 调度器会在每个 Epoch 边界自动实时读取此配置：
#    - 8 卡全量并行：  active_gpus = [0, 1, 2, 3, 4, 5, 6, 7]
#    - 动态缩容至 4 卡：active_gpus = [0, 1, 2, 3]
#    - 动态缩容至 2 卡：active_gpus = [0, 1]
#    - 任意指定卡号组合：active_gpus = [0, 2, 5, 7] 或 [1, 3, 6]
# 3. 落选（不在 active_gpus 中）的 GPU 进程将自动释放所有显存（VRAM 降至 0 MB），
#    并将模型权重与优化器状态 Offload 转移至 CPU RAM。

active_gpus = [0, 1, 2, 3, 4, 5, 6, 7]
